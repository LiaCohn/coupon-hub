version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: coupon-hub-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coupon_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coupon-hub-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coupon-hub-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/coupon_hub
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - coupon-hub-network
    command: sh -c "npm run migrate || true && npm start"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coupon-hub-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - coupon-hub-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  coupon-hub-network:
    driver: bridge
